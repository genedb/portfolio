<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gene Dubovoy - Portfolio</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf_viewer.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Seamless pure white background across all viewports */
            overflow: hidden;
            font-family: sans-serif;
        }
        /* Outer master positioning grid */
        #viewport-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        /* Presentation alignment box holding the artwork layers */
        .page-container {
            position: relative;
            display: block;
            width: auto;
            height: auto;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            z-index: 5;
        }
        /* High-priority text layer mapped directly on top of the drawing path */
        .textLayer {
            position: absolute;
            left: 0;
            top: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            opacity: 1;
            line-height: 1.0;
            mix-blend-mode: multiply;
            z-index: 25; /* Forces Safari to prioritize text highlighting over canvas elements */
            pointer-events: auto; /* Activates structural cursor interactions */
        }
        .textLayer ::selection {
            background: rgba(0, 0, 255, 0.15); /* Clean standard selection background */
        }

        /* Hover interaction zones locked tightly to the artwork borders */
        .nav-zone {
            position: absolute;
            top: 0;
            width: 15%; /* Spans exactly 15% width of the presentation sheet */
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 40; /* Sits completely on top to register clicks and hovers instantly */
        }
        .left-zone { left: 0; }
        .right-zone { right: 0; }

        /* Fading vector control arrows */
        .arrow {
            font-size: 3rem;
            color: #111111;
            background-color: rgba(255, 255, 255, 0.95);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s cubic-bezier(0.4, 0, 0.2, 1), transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
            pointer-events: none; /* Allows clicks to pass through straight to the navigation zone */
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        .left-zone:hover .arrow {
            opacity: 1;
            transform: translateX(15px);
        }
        .right-zone:hover .arrow {
            opacity: 1;
            transform: translateX(-15px);
        }
    </style>
</head>
<body>

    <div id="viewport-wrapper">
        <div class="page-container" id="page-container">
            <div class="nav-zone left-zone" onclick="prevPage()">
                <div class="arrow">&#8249;</div>
            </div>
            <div class="nav-zone right-zone" onclick="nextPage()">
                <div class="arrow">&#8250;</div>
            </div>

            <canvas id="pdf-canvas"></canvas>
            <div id="text-layer" class="textLayer"></div>
        </div>
    </div>

    <script>
        const url = 'SVLB.pdf'; 

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumPending = null;

        const canvas = document.getElementById('pdf-canvas'),
              ctx = canvas.getContext('2d'),
              container = document.getElementById('page-container'),
              textLayerDiv = document.getElementById('text-layer');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        function renderPage(num) {
            pageIsRendering = true;

            pdfDoc.getPage(num).then(page => {
                // Calculate scale profiles to align boundaries tightly to window sizes
                const viewport = page.getViewport({ scale: 1 });
                const widthScale = window.innerWidth / viewport.width;
                const heightScale = window.innerHeight / viewport.height;
                const optimalScale = Math.min(widthScale, heightScale);

                const dynamicViewport = page.getViewport({ scale: optimalScale });
                
                // Track physical device pixel scaling properties natively (for crisp Retina lines)
                const outputScale = window.devicePixelRatio || 1;
                
                // Set explicit element dimensions to lock navigation components precisely to drawing bounds
                const canvasWidth = Math.floor(dynamicViewport.width);
                const canvasHeight = Math.floor(dynamicViewport.height);

                container.style.width = canvasWidth + "px";
                container.style.height = canvasHeight + "px";

                canvas.width = Math.floor(canvasWidth * outputScale);
                canvas.height = Math.floor(canvasHeight * outputScale);
                canvas.style.width = "100%";
                canvas.style.height = "100%";

                const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: dynamicViewport,
                    transform: transform
                };

                // Execute crisp vector drawing path
                const renderTask = page.render(renderContext);
                
                renderTask.promise.then(() => {
                    pageIsRendering = false;
                    
                    // Flush lingering text arrays
                    textLayerDiv.innerHTML = '';
                    textLayerDiv.style.width = "100%";
                    textLayerDiv.style.height = "100%";

                    // Extract text vectors out of presentation sheet layout
                    return page.getTextContent();
                }).then(textContent => {
                    // Render interactive, selectable layer natively above the drawing canvas
                    return pdfjsLib.renderTextLayer({
                        textContentSource: textContent,
                        container: textLayerDiv,
                        viewport: dynamicViewport,
                        textDivs: []
                    }).promise;
                }).then(() => {
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });
        }

        function queueRenderPage(num) {
            if (pageIsRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function prevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function nextPage() {
            if (pageNum >= pdfDoc.numPages) return;
            pageNum++;
            queueRenderPage(pageNum);
        }

        // Add standard physical layout key listeners
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') prevPage();
            if (e.key === 'ArrowRight') nextPage();
        });

        // Trigger vector adjustments immediately upon screen size changes
        window.addEventListener('resize', () => {
            if (pdfDoc) queueRenderPage(pageNum);
        });

        // Access and initialize target presentation structure
        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            renderPage(pageNum);
        });
    </script>
</body>
</html>
