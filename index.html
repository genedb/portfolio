<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gene Dubovoy - Portfolio</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            width: 100%;
            height: 100%;
            background-color: #ffffff; /* Seamless pure white background */
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
        }
        /* Three-column grid layout across the entire browser window boundaries */
        #viewport-grid {
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 30% 40% 30%;
            position: relative;
        }
        /* Presentation alignment frame centered underneath the navigation grid */
        #presentation-wrapper {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }
        #pdf-canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        /* Hover interaction zones covering presentation and outer white space */
        .nav-zone {
            height: 100%;
            display: flex;
            align-items: center;
            cursor: pointer;
            z-index: 20;
            position: relative;
            visibility: visible; /* Modified dynamically by JavaScript */
        }
        .left-zone {
            grid-column: 1;
            justify-content: flex-start;
            padding-left: 40px;
        }
        .right-zone {
            grid-column: 3;
            justify-content: flex-end;
            padding-right: 40px;
        }

        /* Doubled Fading Navigation Arrows */
        .arrow {
            font-size: 6rem;
            font-weight: 300;
            color: #111111;
            background-color: rgba(255, 255, 255, 0.95);
            width: 110px;
            height: 110px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            box-shadow: 0 6px 20px rgba(0,0,0,0.06);
            padding-bottom: 12px;
        }
        
        /* Specific adjustments for the loop back symbol text alignment */
        .arrow.loop-symbol {
            padding-bottom: 0px;
            font-size: 4.5rem;
        }

        .left-zone:hover .arrow {
            opacity: 1;
            transform: translateX(20px);
        }
        .right-zone:hover .arrow {
            opacity: 1;
            transform: translateX(-20px);
        }
    </style>
</head>
<body>

    <div id="viewport-grid">
        <div id="left-trigger" class="nav-zone left-zone" onclick="prevPage()">
            <div class="arrow">&#8249;</div>
        </div>
        <div></div>
        <div id="right-trigger" class="nav-zone right-zone" onclick="nextPage()">
            <div id="right-arrow-icon" class="arrow">&#8250;</div>
        </div>
    </div>

    <div id="presentation-wrapper">
        <canvas id="pdf-canvas"></canvas>
    </div>

    <script>
        const url = 'SVLB.pdf'; 

        let pdfDoc = null,
            pageNum = 1,
            pageIsRendering = false,
            pageNumPending = null;

        const canvas = document.getElementById('pdf-canvas'),
              ctx = canvas.getContext('2d'),
              leftTrigger = document.getElementById('left-trigger'),
              rightTrigger = document.getElementById('right-trigger'),
              rightArrowIcon = document.getElementById('right-arrow-icon');

        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // Evaluate page visibility rules based on active queue positions
        function updateNavigationUI() {
            if (!pdfDoc) return;

            // Rule 1: Eliminate left arrow from the very first page
            if (pageNum === 1) {
                leftTrigger.style.visibility = 'hidden';
            } else {
                leftTrigger.style.visibility = 'visible';
            }

            // Rule 2: Replace right arrow with a "back to beginning" circley loop symbol on the last page
            if (pageNum === pdfDoc.numPages) {
                rightArrowIcon.innerHTML = '&#8634;'; // Circular arrow loop symbol
                rightArrowIcon.classList.add('loop-symbol');
            } else {
                rightArrowIcon.innerHTML = '&#8250;'; // Standard chevron right arrow
                rightArrowIcon.classList.remove('loop-symbol');
            }
        }

        function renderPage(num) {
            pageIsRendering = true;
            updateNavigationUI();

            pdfDoc.getPage(num).then(page => {
                const viewport = page.getViewport({ scale: 1 });
                const widthScale = window.innerWidth / viewport.width;
                const heightScale = window.innerHeight / viewport.height;
                const optimalScale = Math.min(widthScale, heightScale);

                const dynamicViewport = page.getViewport({ scale: optimalScale });
                const outputScale = window.devicePixelRatio || 1;
                
                canvas.width = Math.floor(dynamicViewport.width * outputScale);
                canvas.height = Math.floor(dynamicViewport.height * outputScale);
                canvas.style.width = Math.floor(dynamicViewport.width) + "px";
                canvas.style.height = Math.floor(dynamicViewport.height) + "px";

                const transform = outputScale !== 1 ? [outputScale, 0, 0, outputScale, 0, 0] : null;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: dynamicViewport,
                    transform: transform
                };

                page.render(renderContext).promise.then(() => {
                    pageIsRendering = false;
                    if (pageNumPending !== null) {
                        renderPage(pageNumPending);
                        pageNumPending = null;
                    }
                });
            });
        }

        function queueRenderPage(num) {
            if (pageIsRendering) {
                pageNumPending = num;
            } else {
                renderPage(num);
            }
        }

        function prevPage() {
            if (pageNum <= 1) return;
            pageNum--;
            queueRenderPage(pageNum);
        }

        function nextPage() {
            // If user clicks the loop symbol on the last page, cycle back to the beginning
            if (pageNum >= pdfDoc.numPages) {
                pageNum = 1;
                queueRenderPage(pageNum);
                return;
            }
            pageNum++;
            queueRenderPage(pageNum);
        }

        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') prevPage();
            if (e.key === 'ArrowRight') nextPage();
        });

        window.addEventListener('resize', () => {
            if (pdfDoc) queueRenderPage(pageNum);
        });

        pdfjsLib.getDocument(url).promise.then(pdfDoc_ => {
            pdfDoc = pdfDoc_;
            renderPage(pageNum);
        });
    </script>
</body>
</html>
